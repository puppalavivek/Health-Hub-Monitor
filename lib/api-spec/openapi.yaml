openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DocMind RAG Document Q&A API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document management and ingestion
  - name: query
    description: RAG query and Q&A operations
  - name: openai
    description: OpenAI AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all ingested documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: ingestDocument
      tags: [documents]
      summary: Ingest a new document (text or PDF content)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Ingested document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document with its chunks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document with chunks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentWithChunks"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document and its chunks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /documents/stats:
    get:
      operationId: getDocumentStats
      tags: [documents]
      summary: Get document corpus statistics
      responses:
        "200":
          description: Stats about the document corpus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorpusStats"

  /query:
    post:
      operationId: queryDocuments
      tags: [query]
      summary: Ask a natural language question against the document corpus (streaming SSE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryInput"
      responses:
        "200":
          description: SSE stream of answer chunks and cited sources
          content:
            text/event-stream: {}

  /queries/history:
    get:
      operationId: listQueryHistory
      tags: [query]
      summary: List recent query history
      responses:
        "200":
          description: List of past queries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueryRecord"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Document:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        source:
          type: string
        type:
          type: string
          enum: [pdf, word, confluence, text]
        chunkCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - source
        - type
        - chunkCount
        - createdAt

    DocumentInput:
      type: object
      properties:
        title:
          type: string
        source:
          type: string
        type:
          type: string
          enum: [pdf, word, confluence, text]
        content:
          type: string
      required:
        - title
        - source
        - type
        - content

    DocumentChunk:
      type: object
      properties:
        id:
          type: integer
        documentId:
          type: integer
        content:
          type: string
        chunkIndex:
          type: integer
      required:
        - id
        - documentId
        - content
        - chunkIndex

    DocumentWithChunks:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        source:
          type: string
        type:
          type: string
        chunkCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/DocumentChunk"
      required:
        - id
        - title
        - source
        - type
        - chunkCount
        - createdAt
        - chunks

    CorpusStats:
      type: object
      properties:
        totalDocuments:
          type: integer
        totalChunks:
          type: integer
        totalQueries:
          type: integer
        documentsByType:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalDocuments
        - totalChunks
        - totalQueries
        - documentsByType

    QueryInput:
      type: object
      properties:
        question:
          type: string
        topK:
          type: integer
          default: 5
      required:
        - question

    QueryRecord:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        answer:
          type: ["string", "null"]
        sourceCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - question
        - answer
        - sourceCount
        - createdAt

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
